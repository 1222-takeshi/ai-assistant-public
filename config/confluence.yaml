# Confluence 設定ファイル

# Atlassian ドメイン
atlassian_domain: "YOUR_ATLASSIAN_DOMAIN"

# デフォルトスペースキー（Notionタスクから自動生成する際のデフォルト）
default_space_key: "SI"

# 利用可能なスペース一覧
spaces:
  - key: "SI"
    name: "SI スペース"
    url: "https://YOUR_ATLASSIAN_DOMAIN/wiki/spaces/SI/overview"
  - key: "ID"
    name: "ID スペース"
    url: "https://YOUR_ATLASSIAN_DOMAIN/wiki/spaces/ID/overview"
  - key: "YOUR_PERSONAL_SPACE_KEY"
    name: "個人スペース（AI Agent）"
    url: "https://YOUR_ATLASSIAN_DOMAIN/wiki/spaces/YOUR_PERSONAL_SPACE_KEY/overview"

# 親ページID の設定
parent_pages:
  # PMO ドキュメント（Notionタスクから自動生成）の親ページ = AI Agent ページ
  pmo_docs: "YOUR_PMO_DOCS_PAGE_ID"

# 議事録の親ページマッピング（会議ごとに格納先を分ける）
#
# キー説明:
#   keywords     : GCal イベントタイトルの部分一致キーワード（リスト）
#   parent_id    : 議事録を格納する Confluence 親ページID
#   space_key    : 親ページが属するスペース（省略時は default_space_key）
#   copy_from    : 新規作成時のコピー元
#                  "latest" → parent_id 配下の最新子ページを自動取得してコピー
#                  "PAGE_ID" → 指定ページIDからコピー
#                  省略 → templates/meeting-minutes.md を使用
#
meeting_minutes_map:
  - keywords: ["Project sync", "プロジェクトシンク", "project sync"]
    parent_id: "YOUR_MEETING_PARENT_PAGE_ID_1"
    space_key: "SI"
    copy_from: "latest"

  - keywords: ["閉鎖空間先行開発", "閉鎖空間", "sprint会議"]
    parent_id: "YOUR_MEETING_PARENT_PAGE_ID_2"
    space_key: "SI"
    copy_from: "latest"

  - keywords: ["プロジェクト開発効率化", "開発効率化", "AWSIM"]
    parent_id: "YOUR_MEETING_PARENT_PAGE_ID_3"
    space_key: "SI"
    copy_from: "latest"

  - keywords: ["スプリントプランニング", "スプリントレビュー", "Sprint Planning", "Sprint Review"]
    parent_id: "YOUR_MEETING_PARENT_PAGE_ID_4"
    space_key: "SI"
    copy_from: "latest"

  - keywords: ["Daily Scrum", "デイリースクラム", "daily scrum"]
    parent_id: "YOUR_MEETING_PARENT_PAGE_ID_5"
    space_key: "SI"
    copy_from: "latest"

  # 上記にマッチしない会議のフォールバック（pmo_docs 配下に作成）
  - keywords: ["__default__"]
    parent_id: "YOUR_PMO_DOCS_PAGE_ID"
    space_key: "YOUR_PERSONAL_SPACE_KEY"

# ページタイトルのフォーマット
# {date}: YYYY-MM-DD 形式の日付
# {meeting_name}: 会議名
# {report_name}: レポート名
title_formats:
  meeting_minutes: "[議事録] {date} {meeting_name}"
  pmo_report: "[PMO] {date} {report_name}"
  daily_summary: "[PMO日次] {date}"
