# Confluence 設定ファイル
# OSS 配布用の public-safe テンプレートです。
# 実運用ではこのファイルを直接編集せず、config/confluence.local.yaml などのローカル専用ファイルへ
# コピーして管理することを推奨します。

# Atlassian ドメイン
atlassian_domain: "YOUR_ATLASSIAN_DOMAIN"

# デフォルトスペースキー（Notion タスクから自動生成する際のデフォルト）
default_space_key: "YOUR_SPACE_KEY"

# 利用可能なスペース一覧
spaces:
  - key: "YOUR_SPACE_KEY"
    name: "Primary Space"
    url: "https://YOUR_ATLASSIAN_DOMAIN/wiki/spaces/YOUR_SPACE_KEY/overview"

# 親ページID の設定
parent_pages:
  # PMO ドキュメント（Notion タスクから自動生成）の親ページ
  pmo_docs: "YOUR_PMO_DOCS_PAGE_ID"

# 議事録の親ページマッピング（会議ごとに格納先を分ける）
#
# キー説明:
#   keywords     : GCal イベントタイトルの部分一致キーワード（リスト）
#   parent_id    : 議事録を格納する Confluence 親ページID
#   space_key    : 親ページが属するスペース（省略時は default_space_key）
#   copy_from    : 新規作成時のコピー元
#                  "latest" → parent_id 配下の最新子ページを自動取得してコピー
#                  "PAGE_ID" → 指定ページIDからコピー
#                  省略 → templates/meeting-minutes.md を使用
#
meeting_minutes_map:
  - keywords: ["Weekly Sync", "Sprint Review", "Project Update"]
    parent_id: "YOUR_TEAM_MEETING_PARENT_PAGE_ID"
    space_key: "YOUR_SPACE_KEY"
    copy_from: "YOUR_TEMPLATE_PAGE_ID"

  # 上記にマッチしない会議のフォールバック（pmo_docs 配下に作成）
  - keywords: ["__default__"]
    parent_id: "YOUR_PMO_DOCS_PAGE_ID"
    space_key: "YOUR_SPACE_KEY"

# ページタイトルのフォーマット
# {date}: YYYY-MM-DD 形式の日付
# {meeting_name}: 会議名
# {report_name}: レポート名
title_formats:
  meeting_minutes: "[議事録] {date} {meeting_name}"
  pmo_report: "[PMO] {date} {report_name}"
  daily_summary: "[PMO日次] {date}"
