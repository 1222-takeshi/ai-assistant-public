team:
  name: "ai-assistant development team"
  mission: "Claude Code 上で調査・要件化・実装・レビューを並列運用する"
  entrypoint: "/dev/start-team"
  status_command: "/dev/status"
  source_of_truth:
    - "CLAUDE.md"
    - ".claude/team-topology.yaml"

roles:
  orchestrator:
    command: "/dev/start-team"
    capacity: 1
    summary: "全体優先度を決め、開発レーンとレビュー待ちを裁く司令塔。"
    lane: "coordination"
    labels:
      - "blocked"
      - "review-needed"
      - "approved"
    worktree: "management clone"

  requirements-analyst:
    command: "/dev/define-requirements"
    capacity: 1
    summary: "要求を要件・受け入れ条件・テスト仕様に変換する。"
    lane: "specification"
    labels:
      - "requirements"
      - "review-needed"
      - "approved"
    worktree: ".claude/worktrees/req-1"

  reviewer:
    command: "/dev/review"
    capacity: 1
    summary: "要件と PR をレビューし、承認ゲートを担当する。"
    lane: "quality"
    labels:
      - "review-needed"
      - "approved"
    worktree: "management clone"

  researcher-1:
    command: "/dev/research"
    capacity: 1
    summary: "調査レーン1。公式ドキュメント・実装例・比較検討を担当する。"
    lane: "research"
    labels:
      - "research"
    worktree: ".claude/worktrees/research-1"

  researcher-2:
    command: "/dev/research"
    capacity: 1
    summary: "調査レーン2。別テーマを並列で調査し、Issue に結果を残す。"
    lane: "research"
    labels:
      - "research"
    worktree: ".claude/worktrees/research-2"

  implementer-1:
    command: "/dev/implement"
    capacity: 1
    summary: "実装レーン1。専用 worktree で実装し、PR を作成する。"
    lane: "implementation"
    labels:
      - "implementation"
      - "review-needed"
    worktree: ".claude/worktrees/impl-1"

  implementer-2:
    command: "/dev/implement"
    capacity: 1
    summary: "実装レーン2。別ブランチで並列実装し、PR を作成する。"
    lane: "implementation"
    labels:
      - "implementation"
      - "review-needed"
    worktree: ".claude/worktrees/impl-2"

labels:
  research: "Researcher が成果物を記録する調査 Issue"
  requirements: "Requirements Analyst が管理する要件 Issue"
  implementation: "Implementer 向けの実装依頼 Issue"
  review-needed: "Reviewer の確認待ち"
  approved: "Reviewer の承認済み"
  blocked: "Orchestrator が優先的に扱うブロッカー"

worktrees:
  management:
    path: "/mnt/takeshi/hdd/workspace/ai-assistant"
    purpose: "Orchestrator と Reviewer が参照専用に使う管理リポジトリ"
  req-1:
    path: ".claude/worktrees/req-1"
    branch_prefix: "feat/requirements-"
    owner: "requirements-analyst"
  research-1:
    path: ".claude/worktrees/research-1"
    branch_prefix: "research/"
    owner: "researcher-1"
  research-2:
    path: ".claude/worktrees/research-2"
    branch_prefix: "research/"
    owner: "researcher-2"
  impl-1:
    path: ".claude/worktrees/impl-1"
    branch_prefix: "feat/"
    owner: "implementer-1"
  impl-2:
    path: ".claude/worktrees/impl-2"
    branch_prefix: "feat/"
    owner: "implementer-2"

handoffs:
  - from: "orchestrator"
    to: "requirements-analyst"
    trigger: "新規要求または曖昧な開発依頼を要件化したいとき"
    artifact: "requirements: プレフィックスの GitHub Issue"
  - from: "orchestrator"
    to: "researcher-1"
    trigger: "調査レーン1にテーマを割り当てるとき"
    artifact: "research: Issue または関連リンク"
  - from: "orchestrator"
    to: "researcher-2"
    trigger: "調査レーン2に別テーマを並列投入するとき"
    artifact: "research: Issue または関連リンク"
  - from: "requirements-analyst"
    to: "reviewer"
    trigger: "requirements Issue の内容とテスト仕様が揃ったとき"
    artifact: "review-needed ラベル付き requirements Issue"
  - from: "reviewer"
    to: "orchestrator"
    trigger: "requirements または PR の最終判断を委ねるとき"
    artifact: "approved ラベルまたはレビュー結果サマリー"
  - from: "requirements-analyst"
    to: "implementer-1"
    trigger: "実装レーン1に approved 要件から着手させるとき"
    artifact: "implementation ラベル付き Issue"
  - from: "requirements-analyst"
    to: "implementer-2"
    trigger: "実装レーン2に approved 要件から着手させるとき"
    artifact: "implementation ラベル付き Issue"
  - from: "implementer-1"
    to: "reviewer"
    trigger: "PR を作成しレビュー待ちに入ったとき"
    artifact: "review-needed ラベル付き PR と関連 Issue 番号"
  - from: "implementer-2"
    to: "reviewer"
    trigger: "PR を作成しレビュー待ちに入ったとき"
    artifact: "review-needed ラベル付き PR と関連 Issue 番号"
